name: Generate Azure SQL License Pricing JSON

permissions:
  contents: write
  pull-requests: write

on:
  schedule:
    #        ┌───────────── minute (0 - 59)
    #        │  ┌───────────── hour (0 - 23)
    #        │  │ ┌───────────── day of the month (1 - 31)
    #        │  │ │ ┌───────────── month (1 - 12 or JAN-DEC)
    #        │  │ │ │ ┌───────────── day of the week (0 - 6 or SUN-SAT)
    #        │  │ │ │ │
    #        │  │ │ │ │
    #        │  │ │ │ │
    #        *  * * * *
    # At 05:00 UTC on Sundays
    - cron: "0 5 * * 0"

  # Workflow dispatch trigger allows manually running workflow
  workflow_dispatch: {}

jobs:
  azure_sql_license_pricing:
    name: "Generate Azure SQL License Pricing"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: '.python-version'
          cache: 'pip' # caching pip dependencies
          cache-dependency-path: 'requirements.txt'

      - name: Install Python libraries
        run: pip install -r requirements.txt

      - name: Generate Azure SQL License Pricing Data
        run: python3 tools/cloud_data/azure/azure_sql_license_pricing.py

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Update Azure SQL License Pricing Data"
          title: "Update Azure SQL License Pricing Data"
          body: "Updated Azure SQL License Pricing from GitHub Actions Workflow [${{ github.workflow }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          branch: "task/update-azure-sql-license-pricing"
          delete-branch: true
          labels: "automation, data, azure"

      - name: Check outputs
        if: ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          echo "Pull Request Number - ${{ steps.cpr.outputs.pull-request-number }}"
          echo "Pull Request URL - ${{ steps.cpr.outputs.pull-request-url }}"
