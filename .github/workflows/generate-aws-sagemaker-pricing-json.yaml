name: Generate AWS SageMaker Pricing JSON

permissions:
  contents: write
  pull-requests: write

on:
  schedule:
    #        ┌───────────── minute (0 - 59)
    #        │  ┌───────────── hour (0 - 23)
    #        │  │ ┌───────────── day of the month (1 - 31)
    #        │  │ │ ┌───────────── month (1 - 12 or JAN-DEC)
    #        │  │ │ │ ┌───────────── day of the week (0 - 6 or SUN-SAT)
    #        │  │ │ │ │
    #        │  │ │ │ │
    #        │  │ │ │ │
    #        *  * * * *
    # At 04:00 UTC on Sundays
    - cron: "0 4 * * 0"

  # Workflow dispatch trigger allows manually running workflow
  workflow_dispatch: {}

jobs:
  aws_sagemaker_pricing:
    name: "Generate AWS SageMaker Pricing"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: '.python-version'
          cache: 'pip' # caching pip dependencies
          cache-dependency-path: 'requirements.txt'

      - name: Install Python libraries
        run: pip install -r requirements.txt

      # Requires IAM permission: pricing:GetProducts
      - name: Generate AWS SageMaker Pricing Data
        run: python3 tools/cloud_data/aws/aws_sagemaker_pricing.py
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Update AWS SageMaker Pricing Data"
          title: "Update AWS SageMaker Pricing Data"
          body: "Updated AWS SageMaker real-time inference hosting prices sourced from the AWS Price List API (`pricing:GetProducts`, ServiceCode: `AmazonSageMaker`). Generated by GitHub Actions Workflow [${{ github.workflow }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          branch: "task/update-aws-sagemaker-pricing"
          delete-branch: true
          labels: "automation, data, aws"

      - name: Check outputs
        if: ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          echo "Pull Request Number - ${{ steps.cpr.outputs.pull-request-number }}"
          echo "Pull Request URL - ${{ steps.cpr.outputs.pull-request-url }}"
