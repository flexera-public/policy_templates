# GitHub Copilot Configuration
#
# Repository-level Copilot configuration for flexera-public/policy_templates.
#
# Copilot configuration for this repository is primarily managed through:
#   - .copilotignore              -- files excluded from Copilot's context
#   - .github/agents/             -- Copilot coding agent instructions
#   - .github/copilot-setup-steps.yml (if present) -- agent environment setup
#
# See: https://docs.github.com/en/copilot/managing-copilot

github:
  copilot:
    enable: true
